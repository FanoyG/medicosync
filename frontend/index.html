<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, viewport-fit=cover" />
    <title>MedicoSync</title>
    <meta name="description" content="MedicoSync — The modern platform for doctors to manage patient records securely." />
    <meta name="robots" content="index, follow" />

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#1a6ff4" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="MedicoSync" />
    <link rel="apple-touch-icon" href="/icon-192.png" />

    <!-- OG -->
    <meta property="og:title" content="MedicoSync" />
    <meta property="og:description" content="The modern platform for doctors to manage patient records, collaborate with specialists, and share medical data securely." />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="MedicoSync" />
    <meta name="twitter:description" content="The modern platform for doctors to manage patient records securely." />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').catch(() => {});
        });
      }
    </script>
  </body>
</html>
